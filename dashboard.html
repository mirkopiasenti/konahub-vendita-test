<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Mirox Vendita</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF6600;
      --primary-dark: #E55A00;
      --primary-light: #FF8533;
      --primary-bg: #FFF3E0;
      --text: #0f172a;
      --text-secondary: #64748b;
      --text-light: #94a3b8;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --bg: #f8fafc;
      --bg-card: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    *:focus { outline: none; }
    *:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      height: 78px;
      overflow: hidden;
    }
    .topbar-logo {
      height: 78px;
      width: 200px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .topbar-logo img {
      height: 240px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: block;
    }
    .topbar-user {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px 6px 6px;
      background: var(--bg);
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
    }
    .user-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .btn-logout {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn-logout:hover {
      background: #fef2f2;
      border-color: #fecaca;
      color: #dc2626;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 20px 20px;
    }
    .hero-eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary);
      background: var(--primary-bg);
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .hero-greeting {
      font-size: 42px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .hero-greeting span {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* TABS */
    .tabs-wrap {
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }
    .tabs {
      display: inline-flex;
      gap: 6px;
      background: #fff;
      padding: 6px;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .tab-btn {
      background: transparent;
      border: none;
      padding: 11px 28px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      border-radius: 10px;
      transition: all 0.25s ease;
      position: relative;
    }
    .tab-btn:hover {
      color: var(--text);
    }
    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px rgba(255, 102, 0, 0.28);
    }

    /* PANELS */
    .content {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 36px 80px;
    }
    .tab-panel {
      display: none;
    }
    .tab-panel.active {
      display: block;
      animation: panelIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 240px));
      gap: 22px;
      justify-content: center;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 22px 26px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.08);
      border-color: transparent;
    }
    .card:hover::before { transform: scaleX(1); }
    .card-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FFE4CC, #FFB27A);
      transition: transform 0.25s ease;
    }
    .card:hover .card-icon { transform: scale(1.05) rotate(-3deg); }
    .card-icon svg {
      width: 34px;
      height: 34px;
      stroke: var(--primary-dark);
    }
    .card-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .card-sub {
      font-size: 12.5px;
      color: var(--text-secondary);
      margin-top: -10px;
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }
    .empty-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .empty-icon svg { width: 32px; height: 32px; stroke: var(--text-light); }
    .empty-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .empty-sub {
      font-size: 14px;
      color: var(--text-secondary);
    }

    @media (max-width: 640px) {
      .topbar { padding: 14px 18px; }
      .topbar-logo img { height: 44px; }
      .hero { padding: 36px 16px 12px; }
      .hero-greeting { font-size: 30px; }
      .content { padding: 28px 18px 60px; }
      .tab-btn { padding: 10px 18px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo"><img src="assets/logo.png" alt="Mirox"></div>
    <div class="topbar-user">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">M</div>
        <div class="user-name" id="userName">…</div>
      </div>
      <button class="btn-logout" id="btnLogout">Esci</button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">Dashboard Operatore</div>
    <div class="hero-greeting">Ciao <span id="greetName">Operatore</span></div>
    <div class="hero-sub">Seleziona un modulo per iniziare</div>
    <div class="tabs-wrap">
      <div class="tabs" role="tablist">
        <button class="tab-btn active" data-tab="vendita" role="tab">Vendita</button>
        <button class="tab-btn" data-tab="post-vendita" role="tab">Post-Vendita</button>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="tab-panel active" id="panel-vendita">
      <div class="grid">
        <a class="card" href="upload-contratti-vendita.html">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
          </div>
          <div class="card-label">Upload Contratti</div>
          <div class="card-sub">Carica e gestisci contratti vendita</div>
        </a>
      </div>
    </div>

    <div class="tab-panel" id="panel-post-vendita">
      <div class="empty">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
          </svg>
        </div>
        <div class="empty-title">Nessun modulo disponibile</div>
        <div class="empty-sub">I moduli post-vendita saranno disponibili a breve</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async () => {
      const profilo = await Auth.richiediAuth();
      if (!profilo) return;
      const nome = profilo.nome || profilo.email || 'Operatore';
      document.getElementById('greetName').textContent = nome;
      document.getElementById('userName').textContent = nome;
      document.getElementById('userAvatar').textContent = nome.trim().charAt(0).toUpperCase();
    })();

    document.getElementById('btnLogout').addEventListener('click', () => Auth.logout());

    const tabBtns = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;
        if (btn.classList.contains('active')) return;
        tabBtns.forEach(b => b.classList.toggle('active', b === btn));
        panels.forEach(p => {
          p.classList.remove('active');
          if (p.id === 'panel-' + target) {
            // force reflow for the animation to replay
            void p.offsetWidth;
            p.classList.add('active');
          }
        });
      });
    });
  </script>
</body>
</html>
