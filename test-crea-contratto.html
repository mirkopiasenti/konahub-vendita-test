<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Crea Contratto Vendita</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f5f7fa;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 24px;
    }

    .card {
      max-width: 980px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 600;
      font-size: 14px;
    }

    input,
    select,
    button,
    textarea {
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      background: #111827;
      color: #fff;
      border: 0;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      margin: 12px 0;
      font-size: 14px;
      font-weight: 600;
    }

    .status.error {
      color: #b91c1c;
    }

    .status.ok {
      color: #047857;
    }

    pre {
      margin-top: 14px;
      background: #111827;
      color: #f9fafb;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      overflow: auto;
      max-height: 420px;
    }

    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Test Tecnico: Crea Contratto + Upload PDF</h1>
  <div class="card">
    <p class="hint">Pagina tecnica di test. Flusso: crea anagrafica/pratica/contratto e poi carica PDF nel bucket privato.</p>

    <form id="testForm" class="grid">
      <div class="field">
        <label for="cf_piva">CF/P.IVA *</label>
        <input id="cf_piva" name="cf_piva" required>
      </div>

      <div class="field">
        <label for="cluster">Cluster</label>
        <select id="cluster" name="cluster">
          <option value="Consumer">Consumer</option>
          <option value="Business">Business</option>
        </select>
      </div>

      <div class="field">
        <label for="ragione_sociale">Ragione Sociale *</label>
        <input id="ragione_sociale" name="ragione_sociale" required>
      </div>

      <div class="field">
        <label for="nome_referente">Nome Referente</label>
        <input id="nome_referente" name="nome_referente">
      </div>

      <div class="field">
        <label for="cellulare">Cellulare</label>
        <input id="cellulare" name="cellulare">
      </div>

      <div class="field">
        <label for="provincia">Provincia</label>
        <input id="provincia" name="provincia">
      </div>

      <div class="field">
        <label for="comune">Comune</label>
        <input id="comune" name="comune">
      </div>

      <div class="field">
        <label for="via">Via</label>
        <input id="via" name="via">
      </div>

      <div class="field">
        <label for="civico">Civico</label>
        <input id="civico" name="civico">
      </div>

      <div class="field">
        <label for="origine_pratica">Origine Pratica</label>
        <select id="origine_pratica" name="origine_pratica">
          <option value="spontaneo">spontaneo</option>
          <option value="appuntamento_callcenter">appuntamento_callcenter</option>
          <option value="contatto_callcenter_entro_10_giorni">contatto_callcenter_entro_10_giorni</option>
        </select>
      </div>

      <div class="field">
        <label for="categoria_id">Categoria *</label>
        <select id="categoria_id" name="categoria_id" required></select>
      </div>

      <div class="field">
        <label for="offerta_id">Offerta *</label>
        <select id="offerta_id" name="offerta_id" required></select>
      </div>

      <div class="field">
        <label for="opzione_id">Opzione (opzionale)</label>
        <select id="opzione_id" name="opzione_id"></select>
      </div>

      <div class="field full">
        <label for="pdf_file">PDF contratto *</label>
        <input id="pdf_file" name="pdf_file" type="file" accept="application/pdf" required>
      </div>

      <div class="field full">
        <button id="submitBtn" type="submit">Crea contratto e carica PDF</button>
      </div>
    </form>

    <div id="status" class="status"></div>
    <pre id="resultBox">In attesa di esecuzione test...</pre>
  </div>

  <script src="/js/vendita-storage-helper.js"></script>
  <script>
    const state = {
      categorie: [],
      offerte: [],
      opzioni: [],
      reload: []
    };

    const form = document.getElementById('testForm');
    const categoriaSelect = document.getElementById('categoria_id');
    const offertaSelect = document.getElementById('offerta_id');
    const opzioneSelect = document.getElementById('opzione_id');
    const statusBox = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const submitBtn = document.getElementById('submitBtn');

    function setStatus(message, type) {
      statusBox.textContent = message || '';
      statusBox.className = 'status' + (type ? ` ${type}` : '');
    }

    function setResult(data) {
      resultBox.textContent = JSON.stringify(data, null, 2);
    }

    function optionHtml(value, label) {
      return `<option value="${value}">${label}</option>`;
    }

    function renderCategorie() {
      categoriaSelect.innerHTML = state.categorie
        .map((c) => optionHtml(c.id, c.nome || c.id))
        .join('');
    }

    function filteredOfferte() {
      const categoriaId = categoriaSelect.value;
      return state.offerte.filter((o) => o.categoria_id === categoriaId);
    }

    function filteredOpzioni() {
      const categoriaId = categoriaSelect.value;
      const offertaId = offertaSelect.value;

      return state.opzioni.filter((o) => {
        const categoriaOk = !o.categoria_id || o.categoria_id === categoriaId;
        const offertaOk = !o.offerta_id || o.offerta_id === offertaId;
        return categoriaOk && offertaOk;
      });
    }

    function renderOfferte() {
      const offerte = filteredOfferte();

      if (offerte.length === 0) {
        offertaSelect.innerHTML = '<option value="">Nessuna offerta disponibile</option>';
        return;
      }

      offertaSelect.innerHTML = offerte
        .map((o) => optionHtml(o.id, o.nome_offerta || o.id))
        .join('');
    }

    function renderOpzioni() {
      const opzioni = filteredOpzioni();
      const rows = [optionHtml('', 'Nessuna opzione')].concat(
        opzioni.map((o) => optionHtml(o.id, o.nome_opzione || o.id))
      );

      opzioneSelect.innerHTML = rows.join('');
    }

    async function loadConfig() {
      setStatus('Caricamento configurazione vendita...', '');

      const response = await fetch('/.netlify/functions/vendita-config');
      const data = await response.json();

      if (!response.ok || !data.success) {
        throw new Error(data.error || 'Errore caricamento configurazione');
      }

      state.categorie = data.categorie || [];
      state.offerte = data.offerte || [];
      state.opzioni = data.opzioni || [];
      state.reload = data.reload || [];

      if (state.categorie.length === 0) {
        throw new Error('Nessuna categoria attiva disponibile');
      }

      renderCategorie();
      renderOfferte();
      renderOpzioni();
      setStatus('Configurazione caricata', 'ok');
    }

    function buildCreatePayload() {
      return {
        cf_piva: form.cf_piva.value.trim(),
        cluster: form.cluster.value || 'Consumer',
        ragione_sociale: form.ragione_sociale.value.trim(),
        nome_referente: form.nome_referente.value.trim() || null,
        cellulare: form.cellulare.value.trim() || null,
        provincia: form.provincia.value.trim() || null,
        comune: form.comune.value.trim() || null,
        via: form.via.value.trim() || null,
        civico: form.civico.value.trim() || null,

        origine_pratica: form.origine_pratica.value || 'spontaneo',
        appuntamento_id: null,
        chiamata_id: null,
        operatore_id: null,

        categoria_id: form.categoria_id.value,
        offerta_id: form.offerta_id.value,
        opzione_id: form.opzione_id.value || null,
        reload_id: null,

        tipo_attivazione: null,
        apri_chiudi: null,
        intestatario: null,
        switch_sim: null,
        modalita_pagamento: null,

        dispositivo_associato: false,
        imei: null,
        fascia_prezzo: null,
        tipo_acquisto: null,
        finanziaria: null,
        kolme: null
      };
    }

    async function createPraticaContratto(payload) {
      const response = await fetch('/.netlify/functions/crea-vendita-pratica-contratto', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (!response.ok || !data.success) {
        throw new Error(data.error || 'Errore creazione pratica/contratto');
      }

      return data;
    }

    categoriaSelect.addEventListener('change', () => {
      renderOfferte();
      renderOpzioni();
    });

    offertaSelect.addEventListener('change', () => {
      renderOpzioni();
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const pdfFile = document.getElementById('pdf_file').files[0];

      if (!pdfFile) {
        setStatus('Seleziona un file PDF', 'error');
        return;
      }

      submitBtn.disabled = true;
      setStatus('Creazione pratica e contratto in corso...', '');
      setResult({ step: 'inizio' });

      try {
        const createPayload = buildCreatePayload();
        const createResult = await createPraticaContratto(createPayload);

        setStatus('Contratto creato, upload PDF in corso...', '');

        const uploadResult = await uploadVenditaDocumento({
          file: pdfFile,
          pratica_id: createResult.pratica_id,
          contratto_id: createResult.contratto_id,
          anagrafica_id: createResult.anagrafica_id,
          tipo_documento: 'contratto',
          storage_base_path: createResult.storage_base_path,
          categoria_snapshot: createResult?.contratto?.categoria_snapshot || null
        });

        const finalResult = {
          success: true,
          createResult,
          uploadResult
        };

        setResult(finalResult);
        setStatus('Test completato con successo', 'ok');
      } catch (error) {
        setResult({ success: false, error: error.message });
        setStatus(error.message, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    (async () => {
      try {
        await loadConfig();
      } catch (error) {
        setStatus(error.message, 'error');
        setResult({ success: false, error: error.message });
      }
    })();
  </script>
</body>
</html>
