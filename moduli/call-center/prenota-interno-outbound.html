<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../../assets/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota Appuntamento Outbound - Mirox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .cal-wrapper { max-width:380px; margin:0 auto; }
        .cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .cal-title { font-size:15px; font-weight:600; text-transform:capitalize; }
        .cal-nav { display:flex; gap:4px; }
        .cal-nav button { background:none; border:1px solid var(--border); border-radius:6px; width:48px; height:48px; cursor:pointer; font-size:24px; font-weight:600; color:var(--text-secondary); transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
        .cal-nav button:hover { background:var(--bg); color:var(--text); }
        .weekdays { display:grid; grid-template-columns:repeat(7,1fr); text-align:center; }
        .weekdays div { font-size:11px; font-weight:600; color:var(--text-light); padding:6px 0; text-transform:uppercase; letter-spacing:0.03em; }
        .days { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
        .day { width:100%; aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:8px; font-size:13px; cursor:pointer; font-weight:500; transition:all 0.15s; color:var(--text); }
        .day:hover:not(.empty):not(.disabled) { background:var(--primary-bg); color:var(--primary); }
        .day.empty { cursor:default; }
        .day.today { border:1.5px solid var(--primary); }
        .day.selected { background:var(--primary)!important; color:white!important; border-color:var(--primary)!important; box-shadow:0 2px 8px rgba(255,102,0,0.3); }
        .day.disabled { color:var(--border); pointer-events:none; }
        .day.sunday { color:#e57373; }
        .day.sunday.disabled { color:#f5c6c6; }
        .slots-section { margin-top:20px; padding-top:20px; border-top:1px solid var(--border-light); }
        .slots-label { font-size:13px; font-weight:600; margin-bottom:10px; color:var(--text-secondary); }
        .slots-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
        .slot { background:var(--bg); border:1.5px solid transparent; border-radius:6px; padding:8px 4px; text-align:center; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; }
        .slot:hover { border-color:var(--primary); background:var(--primary-bg); }
        .slot.selected { background:var(--primary); color:white; border-color:var(--primary); }
    </style>
</head>
<body>
<div class="cc-layout">
    <div id="ccHeader"></div>
    <main class="cc-main">
        <div class="page-header">
            <div>
                <h1 class="page-title">Prenota appuntamento negozio</h1>
                <p class="page-subtitle" id="pageSubtitle">Outbound business: scegli data e orario</p>
            </div>
            <button class="btn btn-secondary" id="btnBack">← Torna indietro</button>
        </div>

        <div class="card" style="margin-bottom:20px">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
                <div style="width:40px;height:40px;background:var(--primary-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--primary);font-weight:700" id="leadIniziale">?</div>
                <div>
                    <div style="font-weight:600;font-size:16px" id="leadNome">-</div>
                    <div style="font-size:12px;color:var(--text-secondary)" id="leadDettagli">-</div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom:20px">
            <div class="cal-wrapper">
                <div class="cal-header">
                    <div class="cal-nav"><button id="btnPrevMonth">‹</button></div>
                    <h3 class="cal-title" id="monthDisplay"></h3>
                    <div class="cal-nav"><button id="btnNextMonth">›</button></div>
                </div>
                <div class="weekdays"><div>Lun</div><div>Mar</div><div>Mer</div><div>Gio</div><div>Ven</div><div>Sab</div><div>Dom</div></div>
                <div id="calendarDays" class="days"></div>

                <div id="slotsSection" class="slots-section" style="display:none">
                    <div class="slots-label">Orari disponibili — <span id="selectedDateText" style="color:var(--text)"></span></div>
                    <div id="slotsLoading" class="hidden" style="text-align:center;padding:16px"><div class="spinner"></div></div>
                    <div id="slotsGrid" class="slots-grid"></div>
                </div>
            </div>
        </div>

        <button class="btn btn-primary btn-lg w-full" id="btnConferma" style="justify-content:center;display:none">
            Conferma appuntamento negozio
        </button>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/notifiche.js"></script>
    <script src="../../js/cc-header.js"></script>
<script src="js/prenota-interno-outbound.js"></script>
</body>
</html>
