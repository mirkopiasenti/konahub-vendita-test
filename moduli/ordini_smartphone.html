<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Ordini Smartphone - WindTre</title>
<style> * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }

 :root {
 --windtre-orange: #FF6600;
 --windtre-gray: #58595B;
 --light-gray: #F5F5F5;
 --white: #FFFFFF;
 --error-red: #D32F2F;
 --success-green: #388E3C;
 }

 body {
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 background-color: var(--light-gray);
 color: var(--windtre-gray);
 }

 .header {
 background: linear-gradient(135deg, var(--windtre-gray) 0%, #3d3e40 100%);
 color: var(--white);
 padding: 1.5rem 2rem;
 box-shadow: 0 2px 8px rgba(0,0,0,0.1);
 }

 .header-content {
 display: flex;
 justify-content: space-between;
 align-items: center;
 }

 .header h1 {
 font-size: 1.8rem;
 margin-bottom: 0.5rem;
 }

 .header .subtitle {
 font-size: 0.9rem;
 opacity: 0.9;
 }

 .btn-back {
 padding: 8px 20px;
 background-color: transparent;
 color: var(--white);
 border: 2px solid var(--white);
 border-radius: 6px;
 font-size: 0.9rem;
 font-weight: 600;
 cursor: pointer;
 transition: all 0.3s ease;
 text-decoration: none;
 }

 .btn-back:hover {
 background-color: var(--white);
 color: var(--windtre-gray);
 }

 .nav-tabs {
 background: linear-gradient(135deg, var(--windtre-gray) 0%, #3d3e40 100%);
 display: flex;
 padding: 1rem 1.5rem;
 gap: 1rem;
 }

 .nav-tab {
 flex: 1;
 padding: 1rem 1.5rem;
 text-align: center;
 cursor: pointer;
 border: 2px solid var(--windtre-gray);
 background: var(--white);
 font-size: 1rem;
 font-weight: 600;
 color: var(--windtre-gray);
 transition: all 0.3s ease;
 border-radius: 30px;
 box-shadow: 0 2px 8px rgba(0,0,0,0.1);
 }

 .nav-tab:hover {
 background-color: var(--light-gray);
 transform: translateY(-2px);
 }

 .nav-tab.active {
 background: var(--windtre-orange);
 color: var(--white);
 border-color: var(--windtre-orange);
 box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4);
 }

 .nav-tab.active:hover {
 background: #e55c00;
 }

 .container {
 max-width: 1200px;
 margin: 2rem auto;
 padding: 0 1rem;
 }

 .page {
 display: none;
 background-color: var(--white);
 border-radius: 8px;
 padding: 2rem;
 box-shadow: 0 2px 8px rgba(0,0,0,0.1);
 }

 .page.active {
 display: block;
 animation: fadeIn 0.3s ease;
 }

 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(10px); }
 to { opacity: 1; transform: translateY(0); }
 }

 .form-section {
 margin-bottom: 2rem;
 }

 .form-section h2 {
 color: var(--windtre-orange);
 margin-bottom: 1rem;
 font-size: 1.3rem;
 border-bottom: 2px solid var(--light-gray);
 padding-bottom: 0.5rem;
 }

 .form-row {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
 gap: 1rem;
 margin-bottom: 1rem;
 }

 .form-group {
 display: flex;
 flex-direction: column;
 }

 .form-group label {
 margin-bottom: 0.5rem;
 font-weight: 500;
 color: var(--windtre-gray);
 }

 .form-group label .required {
 color: var(--windtre-orange);
 }

 .form-group input[type="text"],
 .form-group input[type="tel"],
 .form-group select,
 .form-group textarea {
 padding: 0.75rem;
 border: 2px solid #ddd;
 border-radius: 4px;
 font-size: 1rem;
 transition: border-color 0.3s ease;
 }

 .form-group input:focus,
 .form-group select:focus,
 .form-group textarea:focus {
 outline: none;
 border-color: var(--windtre-orange);
 }

 .form-group textarea {
 resize: vertical;
 min-height: 80px;
 }

 .btn {
 padding: 0.75rem 2rem;
 border: none;
 border-radius: 4px;
 font-size: 1rem;
 font-weight: 600;
 cursor: pointer;
 transition: all 0.3s ease;
 }

 .btn-primary {
 background-color: var(--windtre-orange);
 color: var(--white);
 width: 100%;
 margin-top: 1rem;
 }

 .btn-primary:hover {
 background-color: #E55A00;
 transform: translateY(-2px);
 box-shadow: 0 4px 8px rgba(255, 102, 0, 0.3);
 }

 .btn-primary:disabled {
 opacity: 0.6;
 cursor: not-allowed;
 transform: none;
 }

 .alert {
 padding: 1rem;
 border-radius: 4px;
 margin-bottom: 1rem;
 animation: fadeIn 0.3s;
 }

 .alert-success {
 background-color: #d1e7dd;
 color: #0f5132;
 border-left: 4px solid var(--success-green);
 }

 .alert-error {
 background-color: #f8d7da;
 color: #842029;
 border-left: 4px solid var(--error-red);
 }

 /* Filtri e Riepilogo */
 .filter-section {
 background-color: var(--light-gray);
 padding: 1.5rem;
 border-radius: 8px;
 margin-bottom: 2rem;
 }

 .filter-row {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
 gap: 1rem;
 }

 .filter-group {
 display: flex;
 flex-direction: column;
 }

 .filter-group label {
 margin-bottom: 0.5rem;
 font-weight: 500;
 font-size: 0.9rem;
 color: var(--windtre-gray);
 }

 .filter-group input,
 .filter-group select {
 padding: 0.6rem;
 border: 2px solid #ddd;
 border-radius: 4px;
 font-size: 0.95rem;
 }

 .hide-venduti-box {
 display: flex;
 align-items: center;
 gap: 0.5rem;
 padding: 0.6rem;
 background: white;
 border: 2px solid #ddd;
 border-radius: 4px;
 cursor: pointer;
 transition: all 0.3s ease;
 }

 .hide-venduti-box:hover {
 border-color: var(--windtre-orange);
 background-color: #fff8f0;
 }

 .hide-venduti-box input[type="checkbox"] {
 cursor: pointer;
 width: 20px;
 height: 20px;
 accent-color: var(--windtre-orange);
 }

 .hide-venduti-box label {
 margin: 0;
 cursor: pointer;
 font-weight: 600;
 color: var(--windtre-gray);
 user-select: none;
 }

 .orders-table {
 width: 100%;
 border-collapse: collapse;
 margin-top: 1rem;
 }

 .orders-table thead {
 background-color: var(--windtre-orange);
 color: var(--white);
 }

 .orders-table th,
 .orders-table td {
 padding: 1rem;
 text-align: left;
 border-bottom: 1px solid #ddd;
 }

 .orders-table th {
 font-weight: 600;
 font-size: 0.9rem;
 text-transform: uppercase;
 letter-spacing: 0.5px;
 }

 .orders-table tbody tr {
 transition: background-color 0.2s;
 }

 .orders-table tbody tr:hover {
 background-color: #f8f9fa;
 }

 .status-badge {
 display: inline-block;
 padding: 0.4rem 0.8rem;
 border-radius: 20px;

</div> <script> // Migrato su Supabase. Tabella: vendita_ordini_smartphone (con anagrafica unificata)
 const sb = db;
 let allOrders = [];
 let currentOrderId = null;
 // Stato della ricerca anagrafica
 const anagState = {
   id: null,        // UUID se anagrafica esistente trovata
   cfPiva: '',      // CF/PIVA normalizzato
   kind: null,      // 'cf' | 'piva' | null
   cluster: null,   // 'Consumer' | 'Business'
   lookupDone: false,
   exists: false
 };

 // Auto-fill operatore dal profilo loggato
 (async () => {
 const p = window.__profilo || await Auth.getSessione();
 if (p) document.getElementById('operatore').value = p.nome || p.email || 'Operatore';
 })();

 // --- Helpers UI per il blocco anagrafica ---
 function setAnagStatus(msg, type) {
   const el = document.getElementById('anag_status');
   const colors = { ok: '#047857', warn: '#b45309', err: '#b91c1c', info: '#1d4ed8' };
   el.style.color = colors[type] || '#0f172a';
   el.textContent = msg || '';
 }
 function setAnagFieldsReadonly(readonly) {
   ['anag_ragione_sociale','anag_nome_referente','anag_cellulare'].forEach(id => {
     const el = document.getElementById(id);
     if (!el) return;
     el.readOnly = !!readonly;
     el.style.background = readonly ? '#f3f4f6' : '';
     el.style.cursor = readonly ? 'not-allowed' : '';
   });
 }
 function showAnagFields(show) {
   document.getElementById('anag_fields').style.display = show ? 'block' : 'none';
 }
 function showOrderDetails(show) {
   document.getElementById('order_details_wrap').style.display = show ? 'block' : 'none';
 }
 function resetAnagState() {
   anagState.id = null; anagState.cfPiva = ''; anagState.kind = null;
   anagState.cluster = null; anagState.lookupDone = false; anagState.exists = false;
   document.getElementById('anag_cluster').value = '';
   document.getElementById('anag_ragione_sociale').value = '';
   document.getElementById('anag_nome_referente').value = '';
   document.getElementById('anag_cellulare').value = '';
   setAnagFieldsReadonly(false);
   showAnagFields(false);
   showOrderDetails(false);
   setAnagStatus('', '');
 }

 // --- Lookup anagrafica al blur del campo CF/PIVA ---
 async function eseguiLookupAnagrafica() {
   const raw = document.getElementById('anag_cfpiva').value;
   const cfPiva = AnagraficaHelper.normalizeCfPiva(raw);
   document.getElementById('anag_cfpiva').value = cfPiva;

   // Sempre reset prima di una nuova ricerca: niente dati "appesi" dal lookup precedente
   resetAnagState();

   if (!cfPiva) return;

   const kind = AnagraficaHelper.detectKind(cfPiva);
   if (!kind) {
     setAnagStatus('Il valore inserito non è un CF (16 caratteri) né una P.IVA (11 cifre). Verifica il dato.', 'err');
     return;
   }
   anagState.cfPiva = cfPiva;
   anagState.kind = kind;
   // Cluster derivato dal kind: questa è la verità (regex CF + Luhn P.IVA)
   anagState.cluster = AnagraficaHelper.clusterFromKind(kind);
   document.getElementById('anag_cluster').value = anagState.cluster;

   setAnagStatus('Ricerca cliente in corso...', 'info');
   try {
     const res = await AnagraficaHelper.cerca(cfPiva);
     anagState.lookupDone = true;
     showOrderDetails(true);
     if (res.found) {
       anagState.id = res.data.id;
       anagState.exists = true;
       document.getElementById('anag_ragione_sociale').value = res.data.ragione_sociale || '';
       document.getElementById('anag_nome_referente').value = res.data.nome_referente || '';
       document.getElementById('anag_cellulare').value = res.data.cellulare || '';
       // Cluster: il kind detection è la verità.
       // Se in DB c'è un cluster diverso (dati legacy errati), lo SEGNALIAMO ma non lo accettiamo.
       const dbCluster = (res.data.cluster || '').trim();
       const detectedCluster = anagState.cluster;
       if (dbCluster && dbCluster !== detectedCluster) {
         setAnagStatus(
           '✓ Cliente trovato: ' + (res.data.ragione_sociale || '-') +
           ' — ⚠ cluster in DB era "' + dbCluster + '" ma è stato corretto a "' + detectedCluster + '" in base al ' + (kind === 'cf' ? 'CF' : 'P.IVA'),
           'warn'
         );
       } else {
         setAnagStatus('✓ Cliente trovato: ' + (res.data.ragione_sociale || '-'), 'ok');
       }
       setAnagFieldsReadonly(true);
       showAnagFields(true);
     } else {
       anagState.id = null;
       anagState.exists = false;
       setAnagFieldsReadonly(false);
       showAnagFields(true);
       setAnagStatus('Cliente nuovo — compila i dati di censimento (minimi obbligatori).', 'warn');
       document.getElementById('anag_ragione_sociale').focus();
     }
   } catch (err) {
     setAnagStatus('Errore ricerca: ' + err.message, 'err');
   }
 }

 // --- Reset automatico dello stato non appena il CF/PIVA viene modificato ---
 // (così se l'utente cancella o cambia, sparisce subito ogni dato della ricerca precedente)
 document.getElementById('anag_cfpiva').addEventListener('input', () => {
   const v = AnagraficaHelper.normalizeCfPiva(document.getElementById('anag_cfpiva').value);
   if (v !== anagState.cfPiva) {
     resetAnagState();
   }
 });
 document.getElementById('anag_cfpiva').addEventListener('blur', eseguiLookupAnagrafica);
 document.getElementById('anag_cfpiva').addEventListener('keydown', (e) => {
   if (e.key === 'Enter') { e.preventDefault(); eseguiLookupAnagrafica(); }
 });

 // Switch tra le tab
 function switchTab(index) {
 const tabs = document.querySelectorAll('.nav-tab');
 const pages = document.querySelectorAll('.page');
 
 tabs.forEach((tab, i) => {
 tab.classList.toggle('active', i === index);
 });
 
 pages.forEach((page, i) => {
 page.classList.toggle('active', i === index);
 });

 if (index === 1) {
 loadOrders();
 }
 }

 // Gestione submit form
 document.getElementById('orderForm').addEventListener('submit', async (e) => {
 e.preventDefault();

 const submitBtn = document.getElementById('submitBtn');
 const profilo = window.__profilo || await Auth.getSessione();

 // --- Validazione cliente (anagrafica) ---
 const datiAnag = {
   cf_piva: document.getElementById('anag_cfpiva').value,
   cluster: document.getElementById('anag_cluster').value,
   ragione_sociale: document.getElementById('anag_ragione_sociale').value,
   nome_referente: document.getElementById('anag_nome_referente').value,
   cellulare: document.getElementById('anag_cellulare').value,
   creato_da: profilo?.id || null
 };
 const errAnag = AnagraficaHelper.validaDatiMinimi(datiAnag);
 if (errAnag) { showMessage(errAnag, 'error'); return; }
 if (!anagState.lookupDone) {
   // Forziamo la ricerca prima del salvataggio se non fatta
   await eseguiLookupAnagrafica();
   if (AnagraficaHelper.validaDatiMinimi(datiAnag)) { showMessage('Verifica i dati cliente', 'error'); return; }
 }

 submitBtn.disabled = true;
 submitBtn.textContent = 'Invio in corso...';

 try {
   // 1. Risolvi/crea anagrafica → ottieni UUID
   const anagraficaId = await AnagraficaHelper.cercaOcrea(datiAnag);

   // 2. Genera codice ordine
   const { data: codiceRow, error: codErr } = await sb.rpc('genera_codice_ordine_smartphone');
   if (codErr) throw codErr;

   // 3. Inserisci ordine collegato all'anagrafica
   const record = {
     codice_ordine: codiceRow || null,
     operatore_id: profilo?.id || null,
     operatore_nome: profilo?.nome || profilo?.email || null,
     anagrafica_id: anagraficaId,
     cf_piva_snapshot: datiAnag.cf_piva,
     nome_cognome: datiAnag.ragione_sociale,    // snapshot
     numero_cellulare: datiAnag.cellulare,      // snapshot
     marca: document.getElementById('marca').value,
     modello: document.getElementById('modello').value.trim(),
     memoria: document.getElementById('memoria').value,
     colorazione: document.getElementById('colorazione').value.trim(),
     note: document.getElementById('note').value.trim() || null,
     stato: 'In attesa'
   };
   const { data: inserted, error } = await sb.from('vendita_ordini_smartphone').insert(record).select().single();
   if (error) throw error;

   // Notifica email a mirko.piasenti@gmail.com (Centro Email Mirox)
   if (window.MiroxMailer) {
     try {
       const noteBlock = record.note
         ? `<div style="background:#fff7ed;border-left:4px solid #FF6600;padding:14px 16px;border-radius:8px;margin-top:18px;"><div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;">Note</div><div style="font-size:14px;line-height:1.5;color:#1e293b;">${record.note}</div></div>`
         : '';
       await window.MiroxMailer.send({
         to: 'mirko.piasenti@gmail.com',
         template: 'ordine_smartphone_nuovo',
         vars: {
           codice_ordine: record.codice_ordine || '-',
           cliente: record.nome_cognome || '-',
           cf: record.cf_piva_snapshot || '-',
           cellulare: record.numero_cellulare || '-',
           marca: record.marca || '-',
           modello: record.modello || '-',
           memoria: record.memoria || '-',
           colorazione: record.colorazione || '-',
           operatore: record.operatore_nome || '-',
           note_block: noteBlock,
           link_ordini: window.location.origin + '/moduli/ordini_smartphone.html'
         },
         related_table: 'vendita_ordini_smartphone',
         related_id: inserted && inserted.id
       });
     } catch (mailErr) {
       console.error('Errore invio mail ordine:', mailErr);
     }
   }

   showMessage('Ordine registrato con successo!', 'success');
   document.getElementById('orderForm').reset();
   resetAnagState();
   setTimeout(() => { window.location.href = '../dashboard.html'; }, 1500);
 } catch (error) {
   console.error('Errore:', error);
   showMessage('Errore durante la registrazione: ' + error.message, 'error');
 } finally {
   submitBtn.disabled = false;
   submitBtn.textContent = 'Registra Ordine';
 }
 });

 // Carica ordini da Supabase
 async function loadOrders() {
 const container = document.getElementById('orders-container');
 container.innerHTML = '<div class="loading">Caricamento ordini in corso...</div>';

 try {
 const { data, error } = await sb
 .from('vendita_ordini_smartphone')
 .select('*')
 .order('data_registrazione', { ascending: false });
 if (error) throw error;
 allOrders = (data || []).map(r => ({
 id: r.id,
 operatore: r.operatore_nome || '',
 nomeCognome: r.nome_cognome || '',
 cfPiva: r.cf_piva_snapshot || '',
 anagraficaId: r.anagrafica_id || null,
 cellulare: r.numero_cellulare || '',
 marca: r.marca || '',
 modello: r.modello || '',
 memoria: r.memoria || '',
 colorazione: r.colorazione || '',
 note: r.note || '',
 stato: r.stato || 'In attesa',
 dataRegistrazione: r.data_registrazione ? new Date(r.data_registrazione).toLocaleString('it-IT') : '',
 codice: r.codice_ordine || ''
 }));
 applyFilters();
 } catch (error) {
 console.error('Errore:', error);
 container.innerHTML = '<div class="alert alert-error">Errore nel caricamento: ' + error.message + '</div>';
 }
 }

 // Visualizza ordini
 function displayOrders(orders) {
 const container = document.getElementById('orders-container');
 
 if (orders.length === 0) {
 container.innerHTML = `
<div class="empty-state">
<p>Nessun ordine trovato</p>
</div> `;
 return;
 }

 container.innerHTML = `
<table class="orders-table">
<thead>
<tr>
<th>Cliente</th>
<th>Dispositivo</th>
<th>Data Ordine</th>
<th>Stato</th>
<th>Azioni</th>
</tr>
</thead>
<tbody> ${orders.map(order => `
<tr>
<td>${order.nomeCognome}</td>
<td>${order.marca} ${order.modello} - ${order.memoria}</td>
<td>${order.dataRegistrazione}</td>
<td><span class="status-badge status-${getStatusClass(order.stato)}">${order.stato}</span></td>
<td><button type="button" class="btn-dettaglio"onclick="showOrderDetail('${order.id}')">Dettaglio</button></td>
</tr> `).join('')}
</tbody>
</table> `;
 }

 // Ottieni classe per stato
 function getStatusClass(stato) {
 const statusMap = {
 'In attesa': 'attesa',
 'In Attesa di Ordine': 'attesa',
 'Ordinato': 'ordinato',
 'Venduto': 'venduto',
 'Annullato': 'annullato'
 };
 return statusMap[stato] || 'attesa';
 }

 // Chiudi modal
 function closeModal() {
 document.getElementById('detailModal').classList.remove('active');
 currentOrderId = null;
 }

 // Aggiorna stato su Supabase
 async function updateStatus(newStatus) {
 if (!currentOrderId) return;
 try {
 const { error } = await sb
 .from('vendita_ordini_smartphone')
 .update({ stato: newStatus })
 .eq('id', currentOrderId);
 if (error) throw error;
 closeModal();
 loadOrders();
 showMessage('Stato aggiornato con successo!', 'success');
 } catch (error) {
 console.error('Errore:', error);
 showMessage('Errore nell\'aggiornamento: ' + error.message, 'error');
 }
 }

 // Filtri
 document.getElementById('filterName').addEventListener('input', applyFilters);
 document.getElementById('filterStatus').addEventListener('change', applyFilters);
 document.getElementById('hideVenduti').addEventListener('change', applyFilters);
 document.getElementById('hideAnnullati').addEventListener('change', applyFilters);

 function toggleNascondiVenduti(event) {
 // Previeni il toggle se si clicca direttamente sul checkbox
 if (event && event.target.id === 'hideVenduti') {
 return;
 }
 const checkbox = document.getElementById('hideVenduti');
 checkbox.checked = !checkbox.checked;
 applyFilters();
 }

 function toggleNascondiAnnullati(event) {
 // Previeni il toggle se si clicca direttamente sul checkbox
 if (event && event.target.id === 'hideAnnullati') {
 return;
 }
 const checkbox = document.getElementById('hideAnnullati');
 checkbox.checked = !checkbox.checked;
 applyFilters();
 }

 function applyFilters() {
 const nameFilter = document.getElementById('filterName').value.toLowerCase();
 const statusFilter = document.getElementById('filterStatus').value;
 const hideVenduti = document.getElementById('hideVenduti').checked;
 const hideAnnullati = document.getElementById('hideAnnullati').checked;

 let filteredOrders = allOrders.filter(order => {
 // Filtro nome/cognome
 const matchName = !nameFilter || 
 order.nomeCognome.toLowerCase().includes(nameFilter);
 
 // Filtro stato
 const matchStatus = !statusFilter || order.stato === statusFilter;
 
 // Filtro nascondi venduti
 const notVenduto = !hideVenduti || order.stato !== 'Venduto';
 
 // Filtro nascondi annullati
 const notAnnullato = !hideAnnullati || order.stato !== 'Annullato';
 
 return matchName && matchStatus && notVenduto && notAnnullato;
 });

 displayOrders(filteredOrders);
 }

 // Mostra messaggi
 function showMessage(text, type) {
 const container = document.getElementById('message-container');
 const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
 container.innerHTML = `<div class="alert ${alertClass}">${text}</div>`;
 
 setTimeout(() => {
 container.innerHTML = '';
 }, 5000);
 }

 // Chiudi modal cliccando fuori
 document.getElementById('detailModal').addEventListener('click', (e) => {
 if (e.target.id === 'detailModal') {
 closeModal();
 }
 });
</script>
