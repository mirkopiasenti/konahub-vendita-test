    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Ticket - KONAHUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --windtre-orange: #FF6600;
            --windtre-gray: #58595B;
            --light-gray: #F5F5F5;
            --white: #FFFFFF;
            --error-red: #D32F2F;
            --success-green: #388E3C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-gray);
            color: var(--windtre-gray);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--windtre-gray) 0%, #3d3e40 100%);
            color: var(--white);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-back {
            padding: 8px 20px;
            background-color: transparent;
            color: var(--white);
            border: 2px solid var(--white);
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-back:hover {
            background-color: var(--white);
            color: var(--windtre-gray);
        }

        /* TOOLBAR */
        .toolbar {
            background: var(--white);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            flex-wrap: wrap;
            gap: 12px;
        }

        .toolbar-left {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: var(--white);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--windtre-gray);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--windtre-orange);
            color: var(--windtre-orange);
        }

        .filter-btn.active {
            background: var(--windtre-orange);
            color: var(--white);
            border-color: var(--windtre-orange);
        }

        .ticket-count {
            font-size: 0.9rem;
            color: #888;
            font-weight: 500;
        }

        .btn-new-ticket {
            padding: 10px 24px;
            background: var(--windtre-orange);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-new-ticket:hover {
            background: #e55a00;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 102, 0, 0.3);
        }

        /* CONTAINER */
        .container {
            max-width: 800px;
            margin: 24px auto;
            padding: 0 16px;
        }

        /* TICKET CARDS */
        .ticket-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ticket-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 4px solid var(--windtre-orange);
            transition: all 0.2s;
        }

        .ticket-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .ticket-card.lavorata {
            border-left-color: var(--success-green);
            opacity: 0.75;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .ticket-cliente {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--windtre-gray);
        }

        .ticket-data {
            font-size: 0.8rem;
            color: #999;
            text-align: right;
            white-space: nowrap;
        }

        .ticket-body {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
        }

        .ticket-info {
            font-size: 0.9rem;
            color: #555;
        }

        .ticket-info strong {
            color: var(--windtre-gray);
            min-width: 120px;
            display: inline-block;
        }

        .ticket-motivazione {
            margin-top: 6px;
            padding: 10px 14px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #444;
            line-height: 1.5;
        }

        .ticket-nota-lavorazione {
            margin-top: 8px;
            padding: 10px 14px;
            background: #e8f5e9;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #2e7d32;
        }

        .ticket-nota-lavorazione strong {
            display: block;
            margin-bottom: 4px;
        }

        .ticket-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
        }

        .btn-lavorata {
            padding: 8px 20px;
            background: var(--success-green);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-lavorata:hover {
            background: #2e7d32;
        }

        .badge-lavorata {
            padding: 6px 14px;
            background: #e8f5e9;
            color: var(--success-green);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 16px;
            color: #ddd;
        }

        .empty-state p {
            font-size: 1rem;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--white);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            color: var(--windtre-gray);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #eee;
            color: var(--windtre-gray);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--windtre-gray);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: inherit;
            background: #fafbfc;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--windtre-orange);
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.1);
            background: var(--white);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group .required::after {
            content: ' *';
            color: var(--error-red);
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancel {
            padding: 10px 24px;
            background: var(--white);
            color: var(--windtre-gray);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            border-color: var(--windtre-gray);
        }

        .btn-submit {
            padding: 10px 24px;
            background: var(--windtre-orange);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background: #e55a00;
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* LOADING */
        .loading-bar {
            display: none;
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .loading-bar.active {
            display: block;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #eee;
            border-top-color: var(--windtre-orange);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 2000;
            transition: transform 0.3s ease;
            color: var(--white);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: var(--success-green);
        }

        .toast.error {
            background: var(--error-red);
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-left {
                justify-content: center;
            }

            .btn-new-ticket {
                justify-content: center;
            }

            .ticket-header {
                flex-direction: column;
                gap: 4px;
            }

            .ticket-data {
                text-align: left;
            }

            .ticket-info strong {
                display: block;
                min-width: auto;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/mirox-modules.css">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>(async () => { window.__profilo = await Auth.richiediAuth(); })();</script>

    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <div>
                <h1>Gestione Ticket</h1>
            </div>
            <a href="../dashboard.html" class="btn-back">← Torna alla dashboard</a>
        </div>
    </header>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="toolbar-left">
            <button class="filter-btn active" id="filterDaGestire" onclick="setFilter('da_gestire')">Da gestire</button>
            <button class="filter-btn" id="filterTutte" onclick="setFilter('tutte')">Tutte</button>
            <span class="ticket-count" id="ticketCount"></span>
        </div>
        <button class="btn-new-ticket" onclick="openNewTicketModal()">+ Nuovo Ticket</button>
    </div>

    <!-- CONTENT -->
    <div class="container">
        <div class="loading-bar active" id="loadingBar">
            <div class="spinner"></div>
            <p>Caricamento ticket...</p>
        </div>

        <div class="ticket-list" id="ticketList"></div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                <rect x="9" y="3" width="6" height="4" rx="1"/>
                <path d="M9 14l2 2 4-4"/>
            </svg>
            <p id="emptyText">Nessun ticket da gestire</p>
        </div>
    </div>

    <!-- MODAL: Nuovo Ticket -->
    <div class="modal-overlay" id="newTicketModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Nuovo Ticket</h2>
                <button class="modal-close" onclick="closeModal('newTicketModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="newTicketForm">
                    <div class="form-group">
                        <label class="required">Intestatario</label>
                        <input type="text" id="ticketIntestatario" required placeholder="Es. Mario Rossi">
                    </div>
                    <div class="form-group">
                        <label>Codice Fiscale / P.IVA <span style="font-weight:400;color:#94a3b8;font-size:12px;">(opzionale)</span></label>
                        <input type="text" id="ticketCfPiva" placeholder="Es. RSSMRA80A01H501Z oppure 12345678901" style="text-transform:uppercase">
                    </div>
                    <div class="form-group">
                        <label class="required">Numero Cellulare</label>
                        <input type="tel" id="ticketCellulare" required placeholder="Es. 333 1234567">
                    </div>
                    <div class="form-group">
                        <label class="required">Con chi vuole parlare</label>
                        <input type="text" id="ticketConChi" required placeholder="Es. Mirko, Francesca...">
                    </div>
                    <div class="form-group">
                        <label class="required">Motivazione</label>
                        <textarea id="ticketMotivazione" required placeholder="Descrivi brevemente la richiesta del cliente..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal('newTicketModal')">Annulla</button>
                <button class="btn-submit" id="btnSubmitTicket" onclick="submitNewTicket()">Crea Ticket</button>
            </div>
        </div>
    </div>

    <!-- MODAL: Segna come Lavorata -->
    <div class="modal-overlay" id="lavorataModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Segna come Lavorata</h2>
                <button class="modal-close" onclick="closeModal('lavorataModal')">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom:16px; color:#666;">Stai segnando come lavorato il ticket di <strong id="lavorataClienteName"></strong></p>
                <div class="form-group">
                    <label>Nota (facoltativa)</label>
                    <textarea id="lavorataNota" placeholder="Es. Cliente richiamato, problema risolto..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal('lavorataModal')">Annulla</button>
                <button class="btn-submit" id="btnSubmitLavorata" onclick="submitLavorata()" style="background: var(--success-green);">Conferma</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // CONFIGURAZIONE - migrato su Supabase, tabella `ticket`
        // ============================================
        const sb = db;

        let allTickets = [];
        let currentFilter = 'da_gestire';
        let currentLavorataIndex = null;

        function mapTicketRow(r) {
            return {
                rowIndex: r.id,
                id: r.id,
                dataCreazione: r.data_creazione,
                intestatario: r.intestatario || '',
                codiceFiscalePiva: r.codice_fiscale_piva || '',
                cellulare: r.cellulare || '',
                conChi: r.con_chi || '',
                motivazione: r.motivazione || '',
                stato: r.stato || 'Da gestire',
                notaLavorazione: r.nota_lavorazione || '',
                dataLavorazione: r.data_lavorazione
            };
        }

        // ============================================
        // CARICAMENTO TICKET
        // ============================================
        async function loadTickets() {
            document.getElementById('loadingBar').classList.add('active');
            document.getElementById('ticketList').innerHTML = '';
            document.getElementById('emptyState').style.display = 'none';

            try {
                const { data, error } = await sb
                    .from('ticket')
                    .select('*')
                    .order('data_creazione', { ascending: false });
                if (error) throw error;
                allTickets = (data || []).map(mapTicketRow);
                // Riordina: Da gestire prima, poi Lavorata; entro lo stesso stato, data DESC
                allTickets.sort((a, b) => {
                    if (a.stato === 'Lavorata' && b.stato !== 'Lavorata') return 1;
                    if (a.stato !== 'Lavorata' && b.stato === 'Lavorata') return -1;
                    return new Date(b.dataCreazione) - new Date(a.dataCreazione);
                });
                renderTickets();
            } catch (error) {
                console.error('Errore:', error);
                showToast('Errore nel caricamento dei ticket: ' + error.message, 'error');
                allTickets = [];
                renderTickets();
            } finally {
                document.getElementById('loadingBar').classList.remove('active');
            }
        }

        // ============================================
        // RENDER TICKET
        // ============================================
        function renderTickets() {
            const list = document.getElementById('ticketList');
            const emptyState = document.getElementById('emptyState');

            let filtered = allTickets;
            if (currentFilter === 'da_gestire') {
                filtered = allTickets.filter(t => t.stato !== 'Lavorata');
            }

            // Aggiorna contatore
            const daGestire = allTickets.filter(t => t.stato !== 'Lavorata').length;
            document.getElementById('ticketCount').textContent =
                currentFilter === 'da_gestire'
                    ? daGestire + ' da gestire'
                    : filtered.length + ' totali (' + daGestire + ' da gestire)';

            if (filtered.length === 0) {
                list.innerHTML = '';
                emptyState.style.display = 'block';
                document.getElementById('emptyText').textContent =
                    currentFilter === 'da_gestire'
                        ? 'Nessun ticket da gestire'
                        : 'Nessun ticket presente';
                return;
            }

            emptyState.style.display = 'none';

            list.innerHTML = filtered.map((ticket, index) => {
                const isLavorata = ticket.stato === 'Lavorata';
                const dataCreazione = formatDate(ticket.dataCreazione);
                const dataLavorazione = ticket.dataLavorazione ? formatDate(ticket.dataLavorazione) : '';

                return `
                    <div class="ticket-card ${isLavorata ? 'lavorata' : ''}">
                        <div class="ticket-header">
                            <div class="ticket-cliente">${escapeHtml(ticket.intestatario)}</div>
                            <div class="ticket-data">${dataCreazione}</div>
                        </div>
                        <div class="ticket-body">
                            ${ticket.codiceFiscalePiva ? `<div class="ticket-info"><strong>CF/P.IVA:</strong> ${escapeHtml(ticket.codiceFiscalePiva)}</div>` : ''}
                            <div class="ticket-info">
                                <strong>Cellulare:</strong> ${escapeHtml(ticket.cellulare)}
                            </div>
                            <div class="ticket-info">
                                <strong>Parlare con:</strong> ${escapeHtml(ticket.conChi)}
                            </div>
                            <div class="ticket-motivazione">${escapeHtml(ticket.motivazione)}</div>
                            ${isLavorata && ticket.notaLavorazione ? `
                                <div class="ticket-nota-lavorazione">
                                    <strong>Nota lavorazione (${dataLavorazione}):</strong>
                                    ${escapeHtml(ticket.notaLavorazione)}
                                </div>
                            ` : ''}
                            ${isLavorata && !ticket.notaLavorazione ? `
                                <div class="ticket-nota-lavorazione">
                                    <strong>Lavorata il ${dataLavorazione}</strong>
                                </div>
                            ` : ''}
                        </div>
                        <div class="ticket-actions">
                            ${isLavorata
                                ? '<span class="badge-lavorata">Lavorata</span>'
                                : `<button class="btn-lavorata" onclick="openLavorataModal(${ticket.rowIndex}, '${escapeHtml(ticket.intestatario)}')">Lavorata</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // FILTRI
        // ============================================
        function setFilter(filter) {
            currentFilter = filter;
            document.getElementById('filterDaGestire').classList.toggle('active', filter === 'da_gestire');
            document.getElementById('filterTutte').classList.toggle('active', filter === 'tutte');
            renderTickets();
        }

        // ============================================
        // NUOVO TICKET
        // ============================================
        function openNewTicketModal() {
            document.getElementById('newTicketForm').reset();
            document.getElementById('btnSubmitTicket').disabled = false;
            openModal('newTicketModal');
        }

        async function submitNewTicket() {
            const intestatario = document.getElementById('ticketIntestatario').value.trim();
            const cfPiva = document.getElementById('ticketCfPiva').value.trim().toUpperCase();
            const cellulare = document.getElementById('ticketCellulare').value.trim();
            const conChi = document.getElementById('ticketConChi').value.trim();
            const motivazione = document.getElementById('ticketMotivazione').value.trim();

            if (!intestatario || !cellulare || !conChi || !motivazione) {
                showToast('Compila tutti i campi obbligatori', 'error');
                return;
            }

            const btn = document.getElementById('btnSubmitTicket');
            btn.disabled = true;
            btn.textContent = 'Salvataggio...';

            try {
                const profilo = window.__profilo || await Auth.getSessione();
                const { error } = await sb.from('ticket').insert({
                    intestatario,
                    codice_fiscale_piva: cfPiva || null,
                    cellulare,
                    con_chi: conChi,
                    motivazione,
                    stato: 'Da gestire',
                    operatore_id: profilo?.id || null,
                    operatore_nome: profilo?.nome || profilo?.email || null
                });
                if (error) throw error;
                showToast('Ticket creato con successo', 'success');
                closeModal('newTicketModal');
                loadTickets();
            } catch (error) {
                console.error('Errore:', error);
                showToast('Errore nel salvataggio: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Crea Ticket';
            }
        }

        // ============================================
        // SEGNA COME LAVORATA
        // ============================================
        function openLavorataModal(rowIndex, clienteName) {
            currentLavorataIndex = rowIndex;
            document.getElementById('lavorataClienteName').textContent = clienteName;
            document.getElementById('lavorataNota').value = '';
            document.getElementById('btnSubmitLavorata').disabled = false;
            openModal('lavorataModal');
        }

        async function submitLavorata() {
            const nota = document.getElementById('lavorataNota').value.trim();
            const btn = document.getElementById('btnSubmitLavorata');
            btn.disabled = true;
            btn.textContent = 'Salvataggio...';

            try {
                const { error } = await sb
                    .from('ticket')
                    .update({
                        stato: 'Lavorata',
                        nota_lavorazione: nota || null,
                        data_lavorazione: new Date().toISOString()
                    })
                    .eq('id', currentLavorataIndex);
                if (error) throw error;
                showToast('Ticket segnato come lavorato', 'success');
                closeModal('lavorataModal');
                loadTickets();
            } catch (error) {
                console.error('Errore:', error);
                showToast('Errore nel salvataggio: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Conferma';
            }
        }

        // ============================================
        // UTILITIES
        // ============================================
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function formatDate(isoString) {
            if (!isoString) return '';
            const d = new Date(isoString);
            const day = d.getDate().toString().padStart(2, '0');
            const month = (d.getMonth() + 1).toString().padStart(2, '0');
            const year = d.getFullYear();
            const hours = d.getHours().toString().padStart(2, '0');
            const minutes = d.getMinutes().toString().padStart(2, '0');
            return `${day}/${month}/${year} ${hours}:${minutes}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Chiudi modal cliccando fuori
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });

        // ============================================
        // INIT
        // ============================================
        window.addEventListener('load', function() {
            loadTickets();
        });
    </script>
</body>
</html>
