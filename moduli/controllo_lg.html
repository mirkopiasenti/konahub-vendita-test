<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controllo L&amp;G — Mirox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/mirox-modules.css">
<style>
:root {
  --primary: #FF6600;
  --primary-dark: #E55A00;
  --primary-bg: #FFF3E0;
  --text: #0f172a;
  --text-secondary: #64748b;
  --text-light: #94a3b8;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --bg: #f8fafc;
  --bg-card: #ffffff;
  --success: #16a34a;
  --success-bg: #DCFCE7;
  --warning: #d97706;
  --warning-bg: #FEF3C7;
  --danger: #b91c1c;
  --danger-bg: #FEE2E2;
  --info: #2563eb;
  --info-bg: #DBEAFE;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
}

.filters-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 14px;
  display: grid;
  grid-template-columns: 1fr 160px;
  gap: 12px;
  align-items: end;
}
.filters-card.lg-filters {
  grid-template-columns: 1.4fr 170px 170px auto auto;
}
@media (max-width: 1100px) { .filters-card.lg-filters { grid-template-columns: 1fr 1fr 1fr; } }
@media (max-width: 800px)  { .filters-card, .filters-card.lg-filters { grid-template-columns: 1fr; } }
.filters-card label { font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:block; }
.filters-card input, .filters-card select {
  width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:13.5px;font-family:inherit;background:#fff;
}
.filters-card input:focus, .filters-card select:focus { outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,102,0,.12); }
.filters-card.disabled-by-search select { opacity:.55; background:#f8fafc; }

/* Stat-card row (pattern Controllo Fissi) */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 14px; }
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 22px;
  display: flex; flex-direction: column; gap: 4px;
  transition: box-shadow .15s ease;
}
.stat-card:hover { box-shadow: 0 4px 12px rgba(15,23,42,.06); }
.stat-card .stat-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
.stat-card .stat-value { font-size: 30px; font-weight: 700; color: var(--text); line-height: 1.1; }
.stat-card .stat-sub { font-size: 11.5px; color: var(--text-light); margin-top: 2px; }
.stat-card.success .stat-value { color: var(--success); }
.stat-card.danger  .stat-value { color: var(--danger); }

.contracts-table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: auto;
}
.contracts-table { width:100%;border-collapse:separate;border-spacing:0; }
.contracts-table thead th {
  background: var(--border-light);
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  white-space: nowrap;
  position: sticky; top: 0;
}
.contracts-table tbody td {
  padding: 12px;
  border-bottom: 1px solid var(--border-light);
  font-size: 13.5px;
  color: var(--text);
  vertical-align: middle;
}
.contracts-table tbody tr:hover { background: var(--bg); }
.contracts-table tbody tr:last-child td { border-bottom: none; }
.contracts-table .cell-cliente { font-weight: 700; }
.contracts-table .cell-mono { font-family: 'SF Mono', ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; }

.stato-pill {
  display: inline-flex; align-items:center; padding:4px 10px; border-radius:999px;
  font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
  white-space: nowrap;
  background: var(--border-light); color: var(--text-secondary);
}
.stato-pill.nuovo            { background: #E0E7FF; color: #3730A3; }
.stato-pill.in-lavorazione   { background: var(--warning-bg); color: var(--warning); }
.stato-pill.in-attivazione   { background: var(--info-bg); color: var(--info); }
.stato-pill.attivato         { background: var(--success-bg); color: var(--success); }
.stato-pill.annullato        { background: #FEF3C7; color: #92400E; }
.stato-pill.rifiutato        { background: var(--danger-bg); color: var(--danger); }

.eye-btn {
  border: 1px solid var(--border); background: #fff; cursor: pointer;
  padding: 5px 9px; border-radius: 8px; font-size: 14px; line-height: 1;
  transition: all .15s ease;
}
.eye-btn:hover { background: var(--danger-bg); border-color: var(--danger); }

.btn-csv {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 14px; font-size: 13px; font-weight: 600; font-family: inherit;
  background: var(--primary); color: #fff; border: 1px solid var(--primary);
  border-radius: 10px; cursor: pointer; transition: all .15s ease;
  white-space: nowrap;
}
.btn-csv:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
.btn-csv:disabled { opacity: .6; cursor: not-allowed; }

.report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
.report-card {
  border: 1px solid var(--border); border-radius: 10px; padding: 14px;
  display: flex; flex-direction: column; gap: 4px;
}
.report-card .rc-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em; }
.report-card .rc-value { font-size: 26px; font-weight: 700; }
.report-card.ok      { background: var(--success-bg); border-color: var(--success); }
.report-card.ok      .rc-value { color: var(--success); }
.report-card.warn    { background: var(--warning-bg); border-color: var(--warning); }
.report-card.warn    .rc-value { color: var(--warning); }
.report-card.danger  { background: var(--danger-bg); border-color: var(--danger); }
.report-card.danger  .rc-value { color: var(--danger); }
.report-card.info    { background: #DBEAFE; border-color: var(--info); }
.report-card.info    .rc-value { color: var(--info); }

.report-section { margin-top: 16px; }
.report-section h4 {
  font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
  color: var(--text); margin-bottom: 8px;
}
.report-list {
  max-height: 240px; overflow: auto;
  border: 1px solid var(--border); border-radius: 10px;
  font-size: 12.5px;
}
.report-list table { width: 100%; border-collapse: collapse; }
.report-list th, .report-list td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border-light); }
.report-list th { background: var(--bg); font-weight: 700; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); position: sticky; top: 0; }
.report-list tr:last-child td { border-bottom: none; }

.detail-rifiutato { display: flex; flex-direction: column; gap: 14px; }
.detail-rifiutato .dr-field {
  background: var(--bg); border-left: 3px solid var(--danger);
  padding: 10px 14px; border-radius: 6px;
}
.detail-rifiutato .dr-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
  color: var(--danger); margin-bottom: 4px;
}
.detail-rifiutato .dr-value { font-size: 13.5px; color: var(--text); line-height: 1.5; word-wrap: break-word; }
.detail-rifiutato .dr-value.empty { color: var(--text-light); font-style: italic; }

.btn-mini {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; font-size: 12px; font-weight: 600; font-family: inherit;
  background: #fff; color: var(--text); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: all .15s ease;
  text-decoration: none;
}
.btn-mini:hover { background: var(--primary-bg); color: var(--primary-dark); border-color: var(--primary); }

.empty-state { padding: 50px 20px; text-align: center; color: var(--text-secondary); }
.empty-state .empty-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.45; }
.empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.empty-state p { font-size: 13px; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/mirox-ui.js"></script>
<script src="../js/mirox-api.js"></script>
<script src="../js/mirox-error-reporter.js"></script>
<script>if (window.MiroxErrorReporter) window.MiroxErrorReporter.install({ source: 'controllo-lg' });</script>
<script>(async () => { window.__profilo = await Auth.richiediAuth(); })();</script>

<!-- Header uniforme Mirox -->
<div class="header">
<div class="header-content">
<div>
<h1>Controllo L&amp;G</h1>
</div>
<a href="../dashboard.html" class="btn-back">← Torna alla dashboard</a>
</div>
</div>

<div class="container">

<!-- Statistiche live -->
<div class="stats-row">
  <div class="stat-card success">
    <div class="stat-label">Inseriti nel mese</div>
    <div class="stat-value" id="statInseritiMese">0</div>
    <div class="stat-sub" id="statMeseLabel1">—</div>
  </div>
  <div class="stat-card danger">
    <div class="stat-label">KO nel mese</div>
    <div class="stat-value" id="statKoMese">0</div>
    <div class="stat-sub" id="statMeseLabel2">—</div>
  </div>
</div>

<!-- Filtri + search -->
<div class="filters-card lg-filters" id="lgFiltersBox">
  <div>
    <label>Cerca <span style="font-weight:500;color:var(--text-light);text-transform:none;letter-spacing:0;">(ignora i filtri)</span></label>
    <input type="text" id="searchLG" placeholder="Ragione sociale, CF/PIVA, numero contratto, POD/PDR, ex fornitore, operatore...">
  </div>
  <div>
    <label>Cluster</label>
    <select id="filtroClusterLg">
      <option value="">Tutti</option>
      <option value="Consumer">Consumer</option>
      <option value="Business">Business</option>
      <option value="Turista">Turista</option>
    </select>
  </div>
  <div>
    <label>Stato</label>
    <select id="filtroStatoLg">
      <option value="">Tutti</option>
      <option value="__null__">Senza stato</option>
      <option value="Nuovo">Nuovo</option>
      <option value="In lavorazione">In lavorazione</option>
      <option value="In attivazione">In attivazione</option>
      <option value="Attivato">Attivato</option>
      <option value="Annullato">Annullato</option>
      <option value="Rifiutato">Rifiutato</option>
    </select>
  </div>
  <div>
    <label>&nbsp;</label>
    <button type="button" class="btn-csv" id="btnImportCsv" title="Carica file CSV WindTre per aggiornare gli stati">
      Carica CSV WindTre
    </button>
    <input type="file" id="csvFileInput" accept=".csv,text/csv" style="display:none;">
  </div>
  <div>
    <label>&nbsp;</label>
    <button type="button" class="btn-mini" onclick="loadAll()">Aggiorna</button>
  </div>
</div>

<div class="contracts-table-wrap">
  <div id="listaLG">
    <div class="empty-state"><div class="empty-icon">⏳</div><h3>Caricamento...</h3></div>
  </div>
</div>

</div>

<script>
const sb = db;

const MESI_IT = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];

const LGState = {
  righe: [],
  search: '',
  filtroCluster: '',
  filtroStato: '',
  profiliMap: new Map()
};

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML;
}
function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso); if (isNaN(d)) return iso;
  return d.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' });
}

async function loadAll() {
  const wrap = document.getElementById('listaLG');
  wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><h3>Caricamento...</h3></div>';
  try {
    // Stessa strategia di controllo_fissi: leggo operatore_id, pod_pdr, numero_contratto_energia,
    // ex_fornitore direttamente dal contratto (RLS-safe rispetto a vendita_pratiche).
    const { data, error } = await sb
      .from('post_vendita_controllo_lg')
      .select(`
        id, contratto_id, pratica_id, anagrafica_id, stato,
        causale_stato_pratica, messaggio_esito_sap, causa_annullamento,
        ultimo_csv_upload_at, ultimo_csv_upload_da,
        created_at, updated_at,
        anagrafica:anagrafica_id ( id, cf_piva, ragione_sociale, cluster, cellulare, email ),
        contratto:contratto_id (
          id, categoria_id, operatore_id, data_contratto, created_at,
          pod_pdr, numero_contratto_energia, ex_fornitore,
          categoria_snapshot, nome_offerta_snapshot
        )
      `)
      .order('created_at', { ascending: false });
    if (error) throw error;
    const righe = data || [];

    // Lookup nomi operatori (FK assente verso profili nello schema, faccio query separata)
    const profIds = new Set();
    righe.forEach(r => { if (r.contratto && r.contratto.operatore_id) profIds.add(r.contratto.operatore_id); });
    if (profIds.size > 0) {
      const { data: profili, error: profErr } = await sb
        .from('profili')
        .select('id, nome')
        .in('id', Array.from(profIds));
      if (!profErr && profili) {
        LGState.profiliMap = new Map(profili.map(p => [p.id, p]));
      }
    }
    LGState.righe = righe;
    aggiornaContatori();
    render();
  } catch (e) {
    console.error('Errore caricamento Controllo L&G:', e);
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon"></div><h3>Errore caricamento</h3><p>${escapeHtml(e.message)}</p></div>`;
  }
}

function operatoreNome(r) {
  const opId = r.contratto && r.contratto.operatore_id;
  if (!opId) return '-';
  const p = LGState.profiliMap.get(opId);
  return p && p.nome ? p.nome : '-';
}

function dataInserimento(r) {
  if (r.contratto && r.contratto.data_contratto) return r.contratto.data_contratto;
  if (r.contratto && r.contratto.created_at) return r.contratto.created_at;
  return r.created_at;
}

function aggiornaContatori() {
  const now = new Date();
  const annoCorr = now.getFullYear();
  const meseCorr = now.getMonth(); // 0-11
  let inseritiMese = 0;
  let koMese = 0;
  for (const r of LGState.righe) {
    // Inseriti nel mese: data_contratto del mese corrente (data della vendita).
    const dIns = dataInserimento(r);
    if (dIns) {
      const d = new Date(dIns);
      if (!isNaN(d) && d.getFullYear() === annoCorr && d.getMonth() === meseCorr) inseritiMese++;
    }
    // KO nel mese: stato='Rifiutato' AND ultimo_csv_upload_at del mese corrente
    // (fallback su updated_at se l'aggiornamento e' avvenuto senza CSV).
    if (r.stato === 'Rifiutato') {
      const ref = r.ultimo_csv_upload_at || r.updated_at;
      if (ref) {
        const d = new Date(ref);
        if (!isNaN(d) && d.getFullYear() === annoCorr && d.getMonth() === meseCorr) koMese++;
      }
    }
  }
  document.getElementById('statInseritiMese').textContent = inseritiMese;
  document.getElementById('statKoMese').textContent = koMese;
  const meseLabel = MESI_IT[meseCorr] + ' ' + annoCorr;
  document.getElementById('statMeseLabel1').textContent = meseLabel;
  document.getElementById('statMeseLabel2').textContent = meseLabel;
}

function matchSearch(r, q) {
  if (!q) return true;
  const ana = r.anagrafica || {};
  const c = r.contratto || {};
  const haystack = [
    ana.ragione_sociale, ana.cf_piva, ana.cluster, ana.cellulare, ana.email,
    c.numero_contratto_energia, c.pod_pdr, c.ex_fornitore,
    r.stato, operatoreNome(r)
  ].filter(Boolean).join(' ').toLowerCase();
  return haystack.includes(q);
}

function render() {
  const wrap = document.getElementById('listaLG');
  const q = (LGState.search || '').toLowerCase().trim();
  let lista;
  if (q) {
    // Ricerca attiva: ignora i filtri (come Controllo Fissi)
    lista = LGState.righe.filter(r => matchSearch(r, q));
  } else {
    lista = LGState.righe;
    if (LGState.filtroCluster) {
      lista = lista.filter(r => (r.anagrafica && r.anagrafica.cluster) === LGState.filtroCluster);
    }
    if (LGState.filtroStato) {
      if (LGState.filtroStato === '__null__') {
        lista = lista.filter(r => !r.stato);
      } else {
        lista = lista.filter(r => r.stato === LGState.filtroStato);
      }
    }
  }

  if (lista.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon"></div><h3>Nessun contratto</h3><p>${q || LGState.filtroCluster || LGState.filtroStato ? 'Nessun risultato con i filtri attuali.' : 'Nessun contratto Energia verificato.'}</p></div>`;
    return;
  }

  const headers = `
    <th>Data Inserimento</th>
    <th>Ragione Sociale</th>
    <th>CF / P.IVA</th>
    <th>Numero Contratto</th>
    <th>POD / PDR</th>
    <th>Ex Fornitore</th>
    <th>Contatto</th>
    <th>Operatore</th>
    <th>Stato</th>
    <th style="text-align:right;">Azioni</th>`;

  const rows = lista.map(r => {
    const ana = r.anagrafica || {};
    const c = r.contratto || {};
    const isRifiutato = r.stato === 'Rifiutato';
    return `<tr>
      <td>${fmtDate(dataInserimento(r))}</td>
      <td class="cell-cliente">${escapeHtml(ana.ragione_sociale || '-')}</td>
      <td class="cell-mono">${escapeHtml(ana.cf_piva || '-')}</td>
      <td class="cell-mono">${escapeHtml(c.numero_contratto_energia || '—')}</td>
      <td class="cell-mono">${escapeHtml(c.pod_pdr || '—')}</td>
      <td>${escapeHtml(c.ex_fornitore || '—')}</td>
      <td class="cell-mono">${escapeHtml(ana.cellulare || '—')}</td>
      <td>${escapeHtml(operatoreNome(r))}</td>
      <td>${r.stato ? `<span class="stato-pill ${statoSlug(r.stato)}">${escapeHtml(r.stato)}</span>` : '<span style="color:var(--text-light);">—</span>'}</td>
      <td style="text-align:right;">${isRifiutato ? `<button type="button" class="eye-btn" title="Vedi dettagli rifiuto" onclick="apriDettaglioRifiutato('${r.id}')">Dettagli</button>` : ''}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table class="contracts-table"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
}

function statoSlug(s) {
  return String(s||'').toLowerCase().replace(/\s+/g,'-');
}

// ============================================================
// POPUP DETTAGLIO RIFIUTATO (colonne N, O, P del CSV)
// ============================================================
function apriDettaglioRifiutato(rigaId) {
  const r = LGState.righe.find(x => x.id === rigaId);
  if (!r) { MiroxUI.toast('Riga non trovata', 'error'); return; }
  const ana = r.anagrafica || {};
  const c = r.contratto || {};

  const body = `
    <div style="margin-bottom:16px;padding:12px 14px;background:var(--bg);border-radius:8px;border:1px solid var(--border);">
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">Pratica</div>
      <div style="font-size:14px;font-weight:700;">${escapeHtml(ana.ragione_sociale || '-')}</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">
        CF/PIVA: <span class="cell-mono">${escapeHtml(ana.cf_piva || '-')}</span>
        &nbsp;·&nbsp; Num. Contratto: <span class="cell-mono">${escapeHtml(c.numero_contratto_energia || '-')}</span>
      </div>
    </div>
    <div class="detail-rifiutato">
      <div class="dr-field">
        <div class="dr-label">Causale stato pratica</div>
        <div class="dr-value ${r.causale_stato_pratica ? '' : 'empty'}">${r.causale_stato_pratica ? escapeHtml(r.causale_stato_pratica) : 'Non specificata'}</div>
      </div>
      <div class="dr-field">
        <div class="dr-label">Messaggio esito da SAP</div>
        <div class="dr-value ${r.messaggio_esito_sap ? '' : 'empty'}">${r.messaggio_esito_sap ? escapeHtml(r.messaggio_esito_sap) : 'Non specificato'}</div>
      </div>
      <div class="dr-field">
        <div class="dr-label">Causa annullamento</div>
        <div class="dr-value ${r.causa_annullamento ? '' : 'empty'}">${r.causa_annullamento ? escapeHtml(r.causa_annullamento) : 'Non specificata'}</div>
      </div>
    </div>
  `;
  const footer = `<button type="button" class="mx-btn mx-btn-secondary" data-mx-close>Chiudi</button>`;
  const m = MiroxUI._build({
    title: 'Dettagli stato Rifiutato',
    bodyHtml: body, footerHtml: footer
  });
  m.foot.querySelector('[data-mx-close]').addEventListener('click', m.close);
}

// ============================================================
// CSV IMPORT — WindTre portal export
// ============================================================
// Colonne del CSV (header riga 1):
//   E = "Codice Fiscale"      (per cluster Consumer)
//   F = "Partita Iva"         (per cluster Business, da normalizzare con padding 0)
//   H = "Proposta di Contratto" (chiave di match: vendita_contratti.numero_contratto_energia)
//   N = "Causale stato pratica" (solo se W='Rifiutato')
//   O = "Messaggio esito da SAP" (solo se W='Rifiutato')
//   P = "Causa Annullamento"    (solo se W='Rifiutato')
//   W = "Stato"                 (nuovo valore per post_vendita_controllo_lg.stato)

const CSV_HEADERS = {
  codiceFiscale:    'Codice Fiscale',
  partitaIva:       'Partita Iva',
  propostaContratto:'Proposta di Contratto',
  causaleStato:     'Causale stato pratica',
  messaggioEsito:   'Messaggio esito da SAP',
  causaAnnullamento:'Causa Annullamento',
  stato:            'Stato'
};

// Gerarchia stati: se il CSV ha più righe per lo stesso numero_contratto (es. LUCE + GAS),
// vince lo stato "più critico" - così l'operatore vede subito eventuali problemi.
const STATO_PRIORITY = {
  'Rifiutato': 6,
  'Annullato': 5,
  'In lavorazione': 4,
  'In attivazione': 3,
  'Nuovo': 2,
  'Attivato': 1
};

function normPiva(raw) {
  if (raw === null || raw === undefined) return '';
  const trimmed = String(raw).trim().replace(/[^\d]/g, '');
  if (!trimmed) return '';
  if (trimmed.length > 11) return trimmed; // probabile errore — non taglio, lascio passare per doublecheck KO
  return trimmed.padStart(11, '0');
}

function normCfPiva(raw) {
  if (raw === null || raw === undefined) return '';
  // Strip BOM + spazi + uppercase (CF), PIVA sara' tutta numerica
  return String(raw).replace(/^﻿/, '').trim().toUpperCase();
}

function normNumContratto(raw) {
  if (raw === null || raw === undefined) return '';
  return String(raw).replace(/^﻿/, '').replace(/[​-‍﻿]/g, '').trim().toUpperCase();
}

function isPivaLike(s) {
  return /^\d{11}$/.test(String(s || '').trim());
}

// chunk(array, size) → split in batch
function chunk(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

const MAX_FILE_SIZE_MB = 20;
const UPDATE_BATCH_SIZE = 50;

document.getElementById('btnImportCsv').addEventListener('click', () => {
  document.getElementById('csvFileInput').click();
});

document.getElementById('csvFileInput').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  e.target.value = ''; // reset cosi' lo stesso file puo' essere ricaricato
  if (!file) return;
  // Check PapaParse caricato (CDN fail-safe)
  if (typeof Papa === 'undefined') {
    await MiroxUI.alert(
      'Libreria CSV (PapaParse) non caricata. Verifica la connessione internet e ricarica la pagina.',
      { type: 'error' }
    );
    return;
  }
  // Check dimensione file
  const fileSizeMb = file.size / (1024 * 1024);
  if (fileSizeMb > MAX_FILE_SIZE_MB) {
    await MiroxUI.alert(
      `Il file e' troppo grande (${fileSizeMb.toFixed(1)} MB). Il limite e' ${MAX_FILE_SIZE_MB} MB.`,
      { type: 'error' }
    );
    return;
  }
  await processaCsv(file);
});

async function processaCsv(file) {
  const loader = MiroxUI.loading.show('Parsing CSV in corso...', file.name);
  try {
    // Parse CSV con PapaParse - separatore ';', con header.
    // transformHeader strip BOM UTF-8 e spazi (export Excel/Windows aggiungono ﻿ al primo header).
    const parsed = await new Promise((resolve, reject) => {
      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        delimiter: ';',
        transformHeader: h => String(h || '').replace(/^﻿/, '').trim(),
        complete: results => resolve(results),
        error: err => reject(err)
      });
    });
    if (parsed.errors && parsed.errors.length > 0) {
      console.warn('CSV parse errors:', parsed.errors);
    }
    const righe = parsed.data || [];
    if (righe.length === 0) {
      loader.error('CSV vuoto');
      await MiroxUI.alert('Il file CSV non contiene righe.', { type: 'warning' });
      return;
    }
    // Verifica che le colonne attese esistano nel header
    const headersTrovati = Object.keys(righe[0] || {});
    const headerMancanti = Object.values(CSV_HEADERS).filter(h => !headersTrovati.includes(h));
    if (headerMancanti.length > 0) {
      loader.error('Header non valido');
      await MiroxUI.alert(
        `Il CSV non contiene le colonne attese:<br><br><strong>${headerMancanti.join(', ')}</strong><br><br>Header trovati nel file: <code style="font-size:11px;">${headersTrovati.slice(0, 8).join(', ')}${headersTrovati.length > 8 ? '...' : ''}</code><br><br>Verifica che il file sia un'estrazione dal portale WindTre con separatore ";".`,
        { type: 'error', html: true }
      );
      return;
    }

    // Aggrega per Proposta di Contratto (case-insensitive), scegliendo lo stato a priorita' maggiore
    const aggregato = new Map(); // numContrattoNorm -> { numContrattoOriginal, stato, ... }
    for (const row of righe) {
      const numContrattoNorm = normNumContratto(row[CSV_HEADERS.propostaContratto]);
      const stato = String(row[CSV_HEADERS.stato] || '').trim();
      if (!numContrattoNorm || !stato) continue;
      const cur = aggregato.get(numContrattoNorm);
      const newPri = STATO_PRIORITY[stato] || 0;
      const curPri = cur ? (STATO_PRIORITY[cur.stato] || 0) : -1;
      if (!cur || newPri > curPri) {
        aggregato.set(numContrattoNorm, {
          numContrattoOriginal: String(row[CSV_HEADERS.propostaContratto] || '').trim(),
          stato,
          causale: String(row[CSV_HEADERS.causaleStato] || '').trim() || null,
          messaggio: String(row[CSV_HEADERS.messaggioEsito] || '').trim() || null,
          causa: String(row[CSV_HEADERS.causaAnnullamento] || '').trim() || null,
          cfCsv: normCfPiva(row[CSV_HEADERS.codiceFiscale]),
          pivaCsvRaw: String(row[CSV_HEADERS.partitaIva] || '').trim(),
          pivaCsvNorm: normPiva(row[CSV_HEADERS.partitaIva])
        });
      }
    }

    loader.setText('Confronto con database...');

    // Refresh dati DB (fa anche il lookup profili)
    await loadAll();

    // Indice DB: numero_contratto_energia (case-insensitive) -> riga
    // Skippo le righe DB con numero_contratto_energia vuoto/null (non possono matchare).
    const indiceDb = new Map();
    for (const r of LGState.righe) {
      const num = r.contratto && r.contratto.numero_contratto_energia;
      if (!num) continue;
      const key = normNumContratto(num);
      if (!key) continue;
      if (!indiceDb.has(key)) indiceDb.set(key, r);
    }

    // Calcolo le incongruenze
    const aggiornati = [];      // {numContratto, oldStato, newStato, ragSoc}
    const stateInvariati = [];  // numContratto matchato ma stato gia' uguale
    const noMatchDb = [];       // numContratto del CSV ma non presente nel DB
    const doubleCheckKo = [];   // numContratto matchato ma CF/PIVA non corrispondente
    const updateBuilders = [];  // {id, payload} per batch UPDATE

    const profilo = window.__profilo || {};
    const nowIso = new Date().toISOString();

    for (const [numContrattoNorm, csvData] of aggregato.entries()) {
      const numContrattoDisplay = csvData.numContrattoOriginal;
      const rigaDb = indiceDb.get(numContrattoNorm);
      if (!rigaDb) {
        noMatchDb.push({ numContratto: numContrattoDisplay, stato: csvData.stato });
        continue;
      }

      // Double check CF/PIVA
      const ana = rigaDb.anagrafica || {};
      const cfDbNorm = normCfPiva(ana.cf_piva);

      // Edge case: anagrafica senza cf_piva — segnalo separatamente
      if (!cfDbNorm) {
        doubleCheckKo.push({
          numContratto: numContrattoDisplay,
          ragSoc: ana.ragione_sociale || '-',
          campo: 'Anagrafica',
          dbValue: '(CF/PIVA mancante nel DB)',
          csvValue: csvData.cfCsv || csvData.pivaCsvRaw || '(vuoto)',
          statoCsv: csvData.stato
        });
        continue;
      }

      let checkOk = false;
      let expectedField = '';
      let csvValueDisplay = '';

      if (isPivaLike(cfDbNorm)) {
        // Business -> match con PIVA CSV normalizzata
        checkOk = !!csvData.pivaCsvNorm && cfDbNorm === csvData.pivaCsvNorm;
        expectedField = 'P.IVA';
        csvValueDisplay = csvData.pivaCsvRaw + (csvData.pivaCsvNorm && csvData.pivaCsvRaw !== csvData.pivaCsvNorm
          ? ` (normalizzata: ${csvData.pivaCsvNorm})`
          : '');
      } else {
        // Consumer -> match con CF
        checkOk = !!csvData.cfCsv && cfDbNorm === csvData.cfCsv;
        expectedField = 'CF';
        csvValueDisplay = csvData.cfCsv;
      }

      if (!checkOk) {
        doubleCheckKo.push({
          numContratto: numContrattoDisplay,
          ragSoc: ana.ragione_sociale || '-',
          campo: expectedField,
          dbValue: ana.cf_piva || '-',
          csvValue: csvValueDisplay || '(vuoto)',
          statoCsv: csvData.stato
        });
        continue;
      }

      const oldStato = rigaDb.stato || null;
      const newStato = csvData.stato;

      if (oldStato === newStato) {
        stateInvariati.push({ numContratto: numContrattoDisplay, ragSoc: ana.ragione_sociale || '-', stato: newStato });
      } else {
        aggiornati.push({ numContratto: numContrattoDisplay, oldStato: oldStato || '(vuoto)', newStato, ragSoc: ana.ragione_sociale || '-' });
      }

      const isRifiutato = newStato === 'Rifiutato';
      updateBuilders.push({
        id: rigaDb.id,
        payload: {
          stato: newStato,
          causale_stato_pratica: isRifiutato ? csvData.causale : null,
          messaggio_esito_sap: isRifiutato ? csvData.messaggio : null,
          causa_annullamento: isRifiutato ? csvData.causa : null,
          ultimo_csv_upload_at: nowIso,
          ultimo_csv_upload_da: profilo.id || null
        }
      });
    }

    // Batch UPDATE: chunk per evitare di saturare Supabase con N promesse in parallelo.
    let updateErrorsCount = 0;
    const totalUpdates = updateBuilders.length;
    const batches = chunk(updateBuilders, UPDATE_BATCH_SIZE);
    for (let i = 0; i < batches.length; i++) {
      loader.setText(`Aggiornamento DB ${Math.min((i+1) * UPDATE_BATCH_SIZE, totalUpdates)}/${totalUpdates}...`);
      const batch = batches[i];
      const results = await Promise.all(batch.map(b =>
        sb.from('post_vendita_controllo_lg').update(b.payload).eq('id', b.id)
      ));
      updateErrorsCount += results.filter(r => r.error).length;
      results.filter(r => r.error).forEach(r => console.error('UPDATE error:', r.error));
    }
    loader.success(`Import completato`);

    setTimeout(() => {
      mostraReportImport({
        totaleRigheCsv: righe.length,
        pratichePcUniche: aggregato.size,
        aggiornati,
        stateInvariati,
        noMatchDb,
        doubleCheckKo,
        updateErrors: updateErrorsCount
      });
      // Refresh dati per mostrare nuovi stati
      loadAll();
    }, 1100);

  } catch (e) {
    console.error('Errore upload CSV:', e);
    loader.error('Errore: ' + e.message);
  }
}

function mostraReportImport(report) {
  const {
    totaleRigheCsv, pratichePcUniche,
    aggiornati, stateInvariati, noMatchDb, doubleCheckKo, updateErrors
  } = report;

  const renderTable = (rows, cols) => {
    if (rows.length === 0) return '<div style="padding:14px;text-align:center;color:var(--text-light);font-size:12.5px;">Nessuna voce</div>';
    const head = cols.map(c => `<th>${escapeHtml(c.label)}</th>`).join('');
    const body = rows.map(r => `<tr>${cols.map(c => `<td>${escapeHtml(c.get(r) ?? '')}</td>`).join('')}</tr>`).join('');
    return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  };

  const sectionsHtml = [
    aggiornati.length > 0 ? `
      <div class="report-section">
        <h4>Stati aggiornati (${aggiornati.length})</h4>
        <div class="report-list">${renderTable(aggiornati, [
          { label: 'Num. Contratto', get: r => r.numContratto },
          { label: 'Ragione Sociale', get: r => r.ragSoc },
          { label: 'Stato precedente', get: r => r.oldStato },
          { label: 'Nuovo stato', get: r => r.newStato }
        ])}</div>
      </div>` : '',
    doubleCheckKo.length > 0 ? `
      <div class="report-section">
        <h4>Doppio check CF/PIVA fallito (${doubleCheckKo.length})</h4>
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">Numero contratto trovato, ma il codice fiscale / partita IVA del CSV non corrisponde a quello in anagrafica. <strong>Non aggiornati.</strong></p>
        <div class="report-list">${renderTable(doubleCheckKo, [
          { label: 'Num. Contratto', get: r => r.numContratto },
          { label: 'Ragione Sociale', get: r => r.ragSoc },
          { label: 'Campo', get: r => r.campo },
          { label: 'Valore DB', get: r => r.dbValue },
          { label: 'Valore CSV', get: r => r.csvValue },
          { label: 'Stato CSV', get: r => r.statoCsv }
        ])}</div>
      </div>` : '',
    noMatchDb.length > 0 ? `
      <div class="report-section">
        <h4>Non trovati nel DB (${noMatchDb.length})</h4>
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">Numero contratto presente nel CSV ma non corrisponde a nessuna riga del modulo Controllo L&G (es. pratica non ancora caricata in Mirox).</p>
        <div class="report-list">${renderTable(noMatchDb, [
          { label: 'Num. Contratto', get: r => r.numContratto },
          { label: 'Stato CSV', get: r => r.stato }
        ])}</div>
      </div>` : '',
    stateInvariati.length > 0 ? `
      <div class="report-section">
        <h4>Stato gi&agrave; aggiornato (${stateInvariati.length})</h4>
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">Lo stato del DB era gi&agrave; uguale a quello del CSV. Nessun cambiamento.</p>
        <div class="report-list">${renderTable(stateInvariati.slice(0, 50), [
          { label: 'Num. Contratto', get: r => r.numContratto },
          { label: 'Ragione Sociale', get: r => r.ragSoc },
          { label: 'Stato', get: r => r.stato }
        ])}${stateInvariati.length > 50 ? `<div style="padding:8px;text-align:center;font-size:11.5px;color:var(--text-light);">... e altre ${stateInvariati.length - 50} righe</div>` : ''}</div>
      </div>` : '',
    updateErrors > 0 ? `<div class="report-section"><h4 style="color:var(--danger);">Errori salvataggio (${updateErrors})</h4><p style="font-size:12px;color:var(--text-secondary);">Alcuni UPDATE sono falliti. Controlla la console browser per i dettagli.</p></div>` : ''
  ].join('');

  const body = `
    <div class="report-grid">
      <div class="report-card info">
        <div class="rc-label">Righe CSV</div>
        <div class="rc-value">${totaleRigheCsv}</div>
      </div>
      <div class="report-card info">
        <div class="rc-label">Pratiche uniche</div>
        <div class="rc-value">${pratichePcUniche}</div>
      </div>
      <div class="report-card ok">
        <div class="rc-label">Aggiornati</div>
        <div class="rc-value">${aggiornati.length}</div>
      </div>
      <div class="report-card warn">
        <div class="rc-label">Double check KO</div>
        <div class="rc-value">${doubleCheckKo.length}</div>
      </div>
      <div class="report-card danger">
        <div class="rc-label">Non trovati DB</div>
        <div class="rc-value">${noMatchDb.length}</div>
      </div>
    </div>
    ${sectionsHtml}
  `;
  const footer = `<button type="button" class="mx-btn mx-btn-primary" data-mx-close>Chiudi</button>`;
  const m = MiroxUI._build({
    title: 'Report import CSV WindTre',
    bodyHtml: body, footerHtml: footer, large: true
  });
  // Espando il modal per ospitare il report
  m.modal.style.maxWidth = '900px';
  m.body.style.maxHeight = '70vh';
  m.body.style.overflowY = 'auto';
  m.foot.querySelector('[data-mx-close]').addEventListener('click', m.close);
}

// ============================================================
// SEARCH + FILTRI (search e filtri mutualmente esclusivi, pattern Controllo Fissi)
// ============================================================
document.getElementById('searchLG').addEventListener('input', e => {
  const txt = e.target.value;
  LGState.search = txt;
  if (txt.trim()) {
    // Reset filtri visivi + logici
    LGState.filtroCluster = '';
    LGState.filtroStato = '';
    document.getElementById('filtroClusterLg').value = '';
    document.getElementById('filtroStatoLg').value = '';
    document.getElementById('lgFiltersBox').classList.add('disabled-by-search');
  } else {
    document.getElementById('lgFiltersBox').classList.remove('disabled-by-search');
  }
  render();
});

function bindLgFiltro(id, key) {
  document.getElementById(id).addEventListener('change', e => {
    LGState[key] = e.target.value;
    if (LGState.search) {
      LGState.search = '';
      document.getElementById('searchLG').value = '';
      document.getElementById('lgFiltersBox').classList.remove('disabled-by-search');
    }
    render();
  });
}
bindLgFiltro('filtroClusterLg', 'filtroCluster');
bindLgFiltro('filtroStatoLg', 'filtroStato');

window.addEventListener('load', () => { loadAll(); });
