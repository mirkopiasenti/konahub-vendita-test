<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Upload Documento Vendita</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f5f7fa; color: #1f2937; }
    .card { max-width: 820px; background: #fff; border: 1px solid #d1d5db; border-radius: 8px; padding: 16px; }
    input, select, button { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
    input { width: 100%; max-width: 640px; box-sizing: border-box; }
    button { background: #111827; color: white; font-weight: 700; cursor: pointer; border: 0; }
    label { font-weight: 700; }
    pre { background: #111827; color: #f9fafb; padding: 12px; border-radius: 8px; overflow:auto; }
  </style>
</head>
<body>
  <h1>Test Upload Documento Vendita</h1>
  <div class="card">
    <div>
      <label>Anagrafica ID</label><br>
      <input id="anagrafica_id">
    </div>
    <br>
    <div>
      <label>Pratica ID</label><br>
      <input id="pratica_id">
    </div>
    <br>
    <div>
      <label>Tipo documento</label><br>
      <select id="tipo_documento">
        <option value="documento_identita">documento_identita</option>
        <option value="contratto">contratto</option>
        <option value="copia_sim_mnp">copia_sim_mnp</option>
        <option value="copia_bolletta">copia_bolletta</option>
      </select>
    </div>
    <br>
    <div>
      <label>PDF</label><br>
      <input id="file" type="file" accept="application/pdf">
    </div>
    <br>
    <button onclick="testUpload()">Carica PDF</button>
    <pre id="result">In attesa...</pre>
  </div>

  <script src="/js/vendita-storage-helper.js"></script>
  <script>
    async function testUpload() {
      const resultBox = document.getElementById('result');
      try {
        const file = document.getElementById('file').files[0];
        const result = await uploadVenditaDocumento({
          file,
          anagrafica_id: document.getElementById('anagrafica_id').value.trim(),
          pratica_id: document.getElementById('pratica_id').value.trim(),
          tipo_documento: document.getElementById('tipo_documento').value,
          storage_base_path: '2026/04/contratto_test_26_04_2026_test/'
        });
        resultBox.textContent = JSON.stringify(result, null, 2);
      } catch (error) {
        resultBox.textContent = 'ERRORE: ' + error.message;
      }
    }
  </script>
</body>
</html>
